server:
  port: ${PORT:8081}
  forward-headers-strategy: framework

app:
  frontend:
    url: ${FRONTEND_URL:https://homegenie-ucu3.onrender.com}

spring:
  application:
    name: user-service
  cloud:
    gcp:
      sql:
        enabled: ${CLOUD_SQL_ENABLED:false}
        instance-connection-name: ${CLOUD_SQL_INSTANCE:}
        database-name: ${CLOUD_SQL_DB:homegenie_users}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/homegenie_users}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "https://api-gateway-6auawohmoa-el.a.run.app/login/oauth2/code/google"
            scope:
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

jwt:
  secret: ${JWT_SECRET:homegenie-secret-key-change-in-production-minimum-32-chars}
  expiration: ${JWT_EXPIRATION:86400000}

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.homegenie: DEBUG